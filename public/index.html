<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CardScan AI — Business Card Reader</title>
    <meta name="description" content="Scan business cards instantly and add contacts to your phone. AI-powered OCR and entity extraction.">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📇</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <!-- App Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="M7 15h0M7 11h0M7 8h0"/>
                        <path d="M11 15h6M11 11h6M11 8h6"/>
                    </svg>
                </div>
                <div>
                    <h1>CardScan AI</h1>
                    <p class="tagline">Business Card Reader</p>
                </div>
            </div>
        </header>



        <!-- Main Content -->
        <main class="main-content">
            <!-- Scan Section -->
            <section class="scan-section" id="scanSection">
                <div class="scan-card">
                    <div class="scan-illustration">
                        <div class="card-mockup">
                            <div class="scan-line"></div>
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="5" width="18" height="14" rx="2"/>
                                <circle cx="9" cy="11" r="2"/>
                                <path d="M13 9h4M13 12h4M13 15h4"/>
                                <path d="M9 15c-1 0-2-.5-2-1.5"/>
                            </svg>
                        </div>
                    </div>
                    <h2>Scan a Business Card</h2>
                    <p>Take a photo or upload an image to extract contact details instantly</p>
                    
                    <div class="capture-buttons">
                        <button class="btn btn-primary btn-large" id="cameraBtn">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                                <circle cx="12" cy="13" r="4"/>
                            </svg>
                            Take Photo
                        </button>
                        <label class="btn btn-secondary btn-large" id="uploadBtn">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            Upload Image
                            <input type="file" accept="image/*" id="uploadInput" hidden>
                        </label>
                    </div>
                </div>
            </section>

            <!-- Camera Interface Section -->
            <section class="camera-section hidden" id="cameraSection">
                <div class="camera-container">
                    <video id="cameraFeed" autoplay playsinline></video>
                    <div class="camera-overlay">
                        <div class="camera-guide">
                            <div class="guide-corner top-left"></div>
                            <div class="guide-corner top-right"></div>
                            <div class="guide-corner bottom-left"></div>
                            <div class="guide-corner bottom-right"></div>
                            <div class="guide-text">Align card within frame</div>
                        </div>
                    </div>
                    <div class="camera-controls">
                        <button class="icon-btn" id="closeCameraBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                        <button class="shutter-btn" id="shutterBtn">
                            <div class="shutter-inner"></div>
                        </button>
                        <button class="icon-btn" id="switchCameraBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="16 3 21 3 21 8"></polyline>
                                <line x1="4" y1="14" x2="9" y2="14"></line>
                                <line x1="9" y1="14" x2="9" y2="19"></line>
                                <line x1="21" y1="3" x2="14" y2="10"></line>
                                <line x1="3" y1="21" x2="10" y2="14"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Processing Section -->
            <section class="processing-section hidden" id="processingSection">
                <div class="process-card">
                    <div class="image-preview-container">
                        <img id="previewImage" alt="Business card preview">
                        <div class="scan-overlay">
                            <div class="scan-beam"></div>
                        </div>
                    </div>
                    <div class="process-steps">
                        <div class="step active" id="stepOcr">
                            <div class="step-indicator">
                                <div class="spinner"></div>
                            </div>
                            <span>Extracting text with OCR...</span>
                        </div>
                        <div class="step" id="stepAi">
                            <div class="step-indicator">
                                <div class="step-dot"></div>
                            </div>
                            <span>Analyzing with AI...</span>
                        </div>
                        <div class="step" id="stepDone">
                            <div class="step-indicator">
                                <div class="step-dot"></div>
                            </div>
                            <span>Done!</span>
                        </div>
                    </div>
                    <div class="ocr-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span class="progress-text" id="progressText">0%</span>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section hidden" id="resultsSection">
                <div class="results-header">
                    <h2>Extracted Contact</h2>
                    <button class="btn btn-ghost" id="scanAgainBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                        </svg>
                        Scan Again
                    </button>
                </div>

                <div class="preview-thumb-container">
                    <img id="resultPreview" alt="Scanned card" class="preview-thumb">
                </div>

                <div class="entity-cards" id="entityCards">
                    <!-- Entities rendered by JS -->
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary btn-large btn-glow" id="addContactBtn">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="8.5" cy="7" r="4"/>
                            <line x1="20" y1="8" x2="20" y2="14"/>
                            <line x1="23" y1="11" x2="17" y2="11"/>
                        </svg>
                        Add to Contacts
                    </button>
                    <button class="btn btn-secondary" id="copyAllBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy All
                    </button>
                </div>
            </section>
        </main>

        <!-- Toast -->
        <div class="toast hidden" id="toast">
            <span id="toastMessage"></span>
        </div>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
